<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山田太郎の自己紹介</title>
    <!-- 読みやすくてやさしい雰囲気のフォントを読み込みます -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- スタイルシートを読み込みます -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container fade-target">
        <!-- プロフィール写真を配置する枠です -->
        <div class="profile-image-frame">
            <img src="ema.png" alt="プロフィール写真" class="profile-image">
        </div>

        <!-- 名前と職業のセクションです -->
        <div class="header-section">
            <h1 class="name">ema</h1>
            <p class="job-title">ユニコーン</p>
        </div>

        <!-- 自己紹介文のセクションです -->
        <div class="intro-section">
            <p>
                はじめまして、emaです！わたしは「みんなを幸せにする伝道師」のユニコーンとして活動しています。<br>
                自然を愛し、風を感じながら元気いっぱいに走ることが大好きです。休日は絵を描いたり旅行に出かけたりして、日々新しいワクワクを見つけています。<br>
                わたしの目標は「世界中の人を幸せにすること」です！これからもたくさんの笑顔を届けていきたいです。どうぞよろしくお願いします！
            </p>
        </div>

        <!-- 趣味のセクションです -->
        <div class="hobbies-section">
            <h2>趣味</h2>
            <ul class="hobby-list">
                <li>🎨 絵を描く</li>
                <li>🏃‍♀️ 走る</li>
                <li>✈️ 旅行</li>
            </ul>
        </div>
    </div>

    <!-- JavaScriptファイルを読み込みます -->
    <script src="script.js"></script>
</body>
</html>
